# ==============================================
# БЛОК ЗАГОЛОВКА ИГРЫ (PLAY)
# ==============================================
- name: Проверка конфигурации контейнера (демо в Replit)
  # Имя задачи (отображается при запуске Ansible)

  hosts: localhost
  # Хост, на котором выполняется: локальная машина (не удалённый сервер)

  connection: local
  # Тип подключения: локальное выполнение (без SSH)

  gather_facts: yes
  # Сбор системной информации о хосте (ОС, дата, пользователь и т.д.)

# ==============================================
# БЛОК ПЕРЕМЕННЫХ
# ==============================================
  vars:
    app_name: "Контейнер безопасности Гартел"
    # Название приложения (для вывода в отчёты)

    version: "v1.0.0"
    # Версия контейнера безопасности

# ==============================================
# БЛОК ЗАДАЧ (TASKS) - ОСНОВНАЯ ЛОГИКА
# ==============================================
  tasks:

    # ==========================================
    # ЗАДАЧА №1: ДИАГНОСТИКА СТРУКТУРЫ ПРОЕКТА
    # ==========================================
    - name: Показать информацию о версии и структуре
      # Действие: вывод отладочной информации в консоль
      debug:
        msg:
          - "========================================"
          - "{{ app_name }}"
          - "Версия: {{ version }}"
          - "========================================"
          - "Структура проекта проверена:"
          - "  - manage.py          {{ '✅' if manage_file.stat.exists else '❌' }}"
          - "  - django_project/     {{ '✅' if django_dir.stat.exists else '❌' }}"
          - "  - tasks/             {{ '✅' if tasks_dir.stat.exists else '❌' }}"
          - "  - templates/         {{ '✅' if templates_dir.stat.exists else '❌' }}"
          - "  - views.py           {{ '✅' if views_file.stat.exists else '❌' }}"
          - "  - settings.py        {{ '✅' if settings_file.stat.exists else '❌' }}"
          - "========================================"
      # ЛОКАЛЬНЫЕ ПЕРЕМЕННЫЕ ДЛЯ ПРОВЕРКИ СУЩЕСТВОВАНИЯ ФАЙЛОВ
      vars:
        manage_file:
          stat:
            exists: "{{ 'manage.py' in ansible_managed | default('') or True }}"
            # ❗ ВНИМАНИЕ: здесь заглушка (всегда возвращает True)
            # В реальном сценарии нужно использовать: lookup('file', 'manage.py')
        django_dir:
          stat:
            exists: "{{ True }}"
        tasks_dir:
          stat:
            exists: "{{ True }}"
        templates_dir:
          stat:
            exists: "{{ True }}"
        views_file:
          stat:
            exists: "{{ True }}"
        settings_file:
          stat:
            exists: "{{ True }}"

    # ==========================================
    # ЗАДАЧА №2: СОХРАНЕНИЕ ОТЧЁТА В ФАЙЛ
    # ==========================================
    - name: Сохранить информацию о конфигурации в файл
      # Действие: копирование текстового содержимого в файл
      copy:
        content: |                         # Многострочный текст (YAML-блок)
          ========================================
          {{ app_name }}
          Версия: {{ version }}
          Дата проверки: {{ ansible_date_time.date }}
          ========================================
          Файлы конфигурации:
          - settings.py
          - urls.py
          - views.py
          - index.html
          ========================================
          Элементы конфигурации:
          1. Исходный код (Python/Django)
          2. HTML-шаблоны
          3. Конфигурационные файлы
          4. Зависимости (requirements.txt)
          5. Документация
          ========================================
        dest: ./config_report.txt           # Путь для сохранения
        mode: '0644'                        # Права доступа: rw-r--r--

    # ==========================================
    # ЗАДАЧА №3: ВЫВОД РЕЗУЛЬТАТА В КОНСОЛЬ
    # ==========================================
    - name: Вывод результата
      # Действие: сообщение об успешном завершении
      debug:
        msg: "✅ Отчёт сохранён в файл config_report.txt"

# ==============================================
# КОММЕНТАРИЙ ПО ИСПОЛЬЗОВАНИЮ
# ==============================================
# Запуск playbook'а:
#   ansible-playbook ansible_demo.yml
#
# Назначение:
#   - Демонстрация структуры контейнера безопасности
#   - Генерация отчёта config_report.txt
#   - Проверка наличия ключевых файлов
#
# Ограничения (СТРОГО ДЛЯ ДЕМО):
#   - Проверка файлов использует заглушки (всегда ✅)
#   - Не выполняет реальную валидацию кода
#   - Только для учебных целей